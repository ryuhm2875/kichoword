<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>류봉두와 함께하는 기초 국어 튼튼 레벨업!</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --green:#58cc02;--green-d:#58a700;--green-l:#d7ffb8;
  --red:#ff4b4b;--red-d:#ea2b2b;--red-l:#ffdfe0;
  --blue:#1cb0f6;--blue-d:#1899d6;
  --yellow:#ffc800;--yellow-d:#e6b400;
  --purple:#ce82ff;
  --gray-1:#f7f7f7;--gray-2:#e5e5e5;--gray-3:#afafaf;--gray-4:#777;--gray-5:#3c3c3c;
  --bg:#fff;
}
html,body{height:100%;background:var(--bg);font-family:'Nunito','Apple SD Gothic Neo',-apple-system,BlinkMacSystemFont,'Segoe UI',Pretendard,Roboto,sans-serif;color:var(--gray-5);overflow-x:hidden;-webkit-text-size-adjust:100%}
#app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative}
button{font-family:inherit;border:none;cursor:pointer;font-weight:800}

/* 듀오링고 3D 푸시 버튼 */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:14px 24px;border-radius:14px;font-size:16px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;transition:transform .05s,box-shadow .05s;user-select:none}
.btn-primary{background:var(--green);color:#fff;box-shadow:0 4px 0 var(--green-d)}
.btn-primary:active{transform:translateY(2px);box-shadow:0 2px 0 var(--green-d)}
.btn-primary:disabled{background:var(--gray-2);color:var(--gray-3);box-shadow:0 4px 0 #d0d0d0;cursor:not-allowed}
.btn-blue{background:var(--blue);color:#fff;box-shadow:0 4px 0 var(--blue-d)}
.btn-blue:active{transform:translateY(2px);box-shadow:0 2px 0 var(--blue-d)}
.btn-red{background:var(--red);color:#fff;box-shadow:0 4px 0 var(--red-d)}
.btn-red:active{transform:translateY(2px);box-shadow:0 2px 0 var(--red-d)}
.btn-ghost{background:#fff;color:var(--gray-4);border:2px solid var(--gray-2);box-shadow:0 4px 0 var(--gray-2)}
.btn-ghost:active{transform:translateY(2px);box-shadow:0 2px 0 var(--gray-2)}

/* 홈 화면 */
.home{padding:24px 20px;display:flex;flex-direction:column;gap:20px;min-height:100vh}
.home-header{text-align:center;margin-top:12px}
.mascot{font-size:64px;margin-bottom:8px}
.home h1{font-size:22px;color:var(--gray-5);line-height:1.3}
.home h1 span{color:var(--green-d)}
.home .sub{color:var(--gray-4);font-size:14px;margin-top:6px}

.name-box{background:var(--gray-1);border:2px solid var(--gray-2);border-radius:16px;padding:16px}
.name-box label{display:block;font-size:13px;color:var(--gray-4);font-weight:700;margin-bottom:8px}
.name-box input{width:100%;padding:14px 16px;border:2px solid var(--gray-2);border-radius:12px;font-size:16px;font-weight:700;background:#fff;outline:none}
.name-box input:focus{border-color:var(--blue)}
.name-status{font-size:12px;color:var(--gray-4);margin-top:8px;text-align:right}
.name-status.ok{color:var(--green-d)}

.stages-title{font-size:14px;color:var(--gray-4);font-weight:800;margin:8px 0 -8px;letter-spacing:1px}
.stages{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.stage-card{background:#fff;border:2px solid var(--gray-2);border-radius:16px;padding:16px 12px;text-align:center;box-shadow:0 4px 0 var(--gray-2);transition:transform .05s,box-shadow .05s;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px}
.stage-card:active{transform:translateY(2px);box-shadow:0 2px 0 var(--gray-2)}
.stage-card.locked{opacity:.45;cursor:not-allowed;background:var(--gray-1)}
.stage-num{font-size:13px;color:var(--gray-3);font-weight:800}
.stage-card.active .stage-num{color:var(--green-d)}
.stage-icon{font-size:32px;line-height:1}
.stage-name{font-size:13px;color:var(--gray-5);font-weight:800;line-height:1.3;min-height:32px;display:flex;align-items:center}

/* 단계 진행 화면 */
.play{padding:16px;min-height:100vh;display:flex;flex-direction:column}
.play-top{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.close-btn{background:none;border:none;font-size:24px;color:var(--gray-3);cursor:pointer;padding:4px 8px;line-height:1}
.progress-bar{flex:1;height:14px;background:var(--gray-2);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:99px;transition:width .3s ease;position:relative}
.progress-fill::after{content:"";position:absolute;top:3px;left:6px;right:6px;height:3px;background:rgba(255,255,255,.5);border-radius:99px}
.hearts{display:flex;align-items:center;gap:4px;color:var(--red);font-weight:800}
.hearts span{font-size:18px}
.hearts em{font-size:14px;font-style:normal;color:var(--red)}

.section-label{font-size:11px;color:var(--gray-4);font-weight:800;letter-spacing:1px;margin-bottom:8px}
.q-title{font-size:22px;font-weight:800;color:var(--gray-5);line-height:1.4;margin-bottom:20px}
.q-sentence{font-size:18px;line-height:1.7;color:var(--gray-5);background:var(--gray-1);padding:18px;border-radius:14px;font-weight:700;border:2px solid var(--gray-2);margin-bottom:24px}
.blank{display:inline-block;min-width:48px;border-bottom:3px solid var(--gray-3);text-align:center;color:var(--blue-d);font-weight:800;padding:0 6px}

.options{display:flex;flex-direction:column;gap:12px;flex:1}
.opt{background:#fff;border:2px solid var(--gray-2);border-radius:14px;padding:18px 16px;font-size:18px;color:var(--gray-5);text-align:center;box-shadow:0 4px 0 var(--gray-2);transition:transform .05s,box-shadow .05s;font-weight:800}
.opt:active{transform:translateY(2px);box-shadow:0 2px 0 var(--gray-2)}
.opt.selected{background:#ddf4ff;border-color:var(--blue);color:var(--blue-d);box-shadow:0 4px 0 var(--blue)}

.dict-area{display:flex;flex-direction:column;gap:14px;flex:1}
.dict-controls{display:flex;gap:8px;flex-wrap:wrap}
.dict-btn{padding:12px 16px;border-radius:12px;background:var(--blue);color:#fff;font-size:14px;font-weight:800;box-shadow:0 3px 0 var(--blue-d);flex:1;min-width:100px}
.dict-btn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--blue-d)}
.dict-btn.alt{background:#fff;color:var(--blue);border:2px solid var(--blue);box-shadow:0 3px 0 var(--blue)}
.dict-input{width:100%;padding:16px;border:3px solid var(--gray-2);border-radius:14px;font-size:18px;font-weight:700;outline:none;font-family:inherit}
.dict-input:focus{border-color:var(--blue)}
.dict-hint{font-size:13px;color:var(--gray-4);text-align:center}

/* 하단 피드백 푸터 */
.feedback{position:fixed;left:0;right:0;bottom:-300px;background:#fff;border-top:2px solid var(--gray-2);padding:20px;transition:bottom .3s ease;z-index:10;max-width:520px;margin:0 auto}
.feedback.show{bottom:0}
.feedback.correct{background:var(--green-l);border-top-color:var(--green)}
.feedback.wrong{background:var(--red-l);border-top-color:var(--red)}
.fb-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.fb-icon{font-size:32px}
.fb-title{font-size:20px;font-weight:800}
.feedback.correct .fb-title{color:var(--green-d)}
.feedback.wrong .fb-title{color:var(--red-d)}
.fb-detail{font-size:14px;color:var(--gray-5);line-height:1.5;margin-bottom:14px}
.fb-detail strong{color:var(--green-d);font-weight:800}
.feedback.wrong .fb-detail strong{color:var(--red-d)}
.fb-btn{width:100%;padding:14px;border-radius:14px;font-size:16px;color:#fff;font-weight:800;letter-spacing:1px;text-transform:uppercase}
.feedback.correct .fb-btn{background:var(--green);box-shadow:0 4px 0 var(--green-d)}
.feedback.wrong .fb-btn{background:var(--red);box-shadow:0 4px 0 var(--red-d)}
.fb-btn:active{transform:translateY(2px)}

/* 인트로 화면 */
.intro{padding:24px 20px;text-align:center;display:flex;flex-direction:column;justify-content:center;flex:1;min-height:100vh;gap:14px}
.intro-icon{font-size:80px;margin-bottom:8px}
.intro h2{font-size:24px;color:var(--gray-5);margin-bottom:6px}
.intro p{font-size:15px;color:var(--gray-4);line-height:1.6;margin-bottom:8px}
.intro-cards{display:flex;justify-content:center;gap:10px;margin:12px 0}
.intro-card{background:var(--gray-1);border:2px solid var(--gray-2);border-radius:12px;padding:12px 16px;flex:1;max-width:140px}
.intro-card .n{font-size:24px;font-weight:800;color:var(--blue-d)}
.intro-card .l{font-size:11px;color:var(--gray-4);font-weight:700;margin-top:2px}

/* 결과 화면 */
.result{padding:24px 20px;min-height:100vh;display:flex;flex-direction:column;gap:18px}
.result-top{text-align:center;padding:24px 0}
.result-emoji{font-size:80px;margin-bottom:8px}
.result-title{font-size:24px;font-weight:800;color:var(--gray-5);margin-bottom:6px}
.result-level{display:inline-block;background:var(--yellow);color:#5a4500;padding:8px 16px;border-radius:99px;font-weight:800;font-size:16px;margin-top:8px;box-shadow:0 3px 0 var(--yellow-d)}
.result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat-card{background:var(--gray-1);border-radius:14px;padding:14px 8px;text-align:center;border:2px solid var(--gray-2)}
.stat-n{font-size:22px;font-weight:800;color:var(--gray-5)}
.stat-l{font-size:11px;color:var(--gray-4);font-weight:700;margin-top:4px}

.review-section h3{font-size:16px;color:var(--gray-5);margin-bottom:10px;font-weight:800}
.review-list{display:flex;flex-direction:column;gap:10px;max-height:340px;overflow-y:auto}
.review-item{background:#fff;border:2px solid var(--red-l);border-left:4px solid var(--red);border-radius:10px;padding:12px}
.review-q{font-size:14px;color:var(--gray-5);font-weight:700;line-height:1.5;margin-bottom:8px}
.review-row{display:flex;gap:8px;font-size:13px;line-height:1.4;margin-top:4px}
.review-row .k{color:var(--gray-4);font-weight:800;min-width:48px}
.review-row.my .v{color:var(--red-d);font-weight:700;text-decoration:line-through}
.review-row.ans .v{color:var(--green-d);font-weight:800}
.review-explain{background:var(--yellow);color:#5a4500;border-radius:8px;padding:8px 10px;font-size:12px;font-weight:700;margin-top:8px;line-height:1.5;white-space:pre-line}

.result-actions{display:flex;flex-direction:column;gap:10px;margin-top:8px;padding-bottom:24px}

/* 게임오버 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:20;padding:20px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:18px;padding:28px 24px;text-align:center;max-width:340px;width:100%}
.modal-icon{font-size:64px;margin-bottom:8px}
.modal h3{font-size:22px;color:var(--gray-5);margin-bottom:8px}
.modal p{font-size:14px;color:var(--gray-4);margin-bottom:18px;line-height:1.5}
.modal-actions{display:flex;flex-direction:column;gap:8px}

/* 토스트 */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--gray-5);color:#fff;padding:12px 20px;border-radius:99px;font-size:14px;font-weight:700;z-index:30;opacity:0;transition:opacity .3s}
/* 모드 선택 */
.mode-section{margin-top:16px;width:100%}
.mode-title{font-size:13px;font-weight:800;color:var(--gray-4);margin-bottom:8px;text-align:left;padding-left:4px}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mode-card{background:#fff;border:2px solid var(--gray-2);border-radius:12px;padding:12px 10px;cursor:pointer;text-align:center;transition:all .15s}
.mode-card .mc-name{font-size:14px;font-weight:800;color:var(--gray-5);margin-bottom:4px}
.mode-card .mc-desc{font-size:11px;color:var(--gray-4);font-weight:600;line-height:1.3}
.mode-card.active{border-color:var(--blue);background:#e8f7ff}
.mode-card.active .mc-name{color:var(--blue-d)}
.mode-badge{display:inline-block;background:var(--blue);color:#fff;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:800;margin-left:6px}
.mode-badge.challenge{background:var(--red)}
.practice-pill{background:var(--blue-d);color:#fff;padding:6px 12px;border-radius:99px;font-size:12px;font-weight:800;display:inline-flex;align-items:center;gap:4px}

.toast.show{opacity:1}

/* 텍스트 강조 */
.kbd{display:inline-block;background:#fff;border:1.5px solid var(--gray-2);border-radius:6px;padding:1px 8px;font-weight:800;color:var(--gray-5);font-size:14px;margin:0 2px}
</style>
</head>
<body>
<div id="app"></div>
<div class="modal-bg" id="modal"></div>
<div class="toast" id="toast"></div>

<script>
/* ========== 설정 ========== */
const CONFIG = {
  APPS_SCRIPT_URL: "https://script.google.com/macros/s/AKfycbyhpAQgl0-cO14yYp8nt8ruiBawGLyhWb25f03gG4BlNkSWWvg_7tOpcgcIQWfVKbM4/exec",
  HEARTS: 5,
  CHALLENGE_HEARTS: 5,
  PRACTICE_HEARTS: 9999
};

/* ========== 문항 은행 (검수 완료) ==========
   각 항목: [질문, 선택지A(정답), 선택지B(오답), 정답인덱스(0), 해설]
*/
const STAGES = [
  {id:1,name:"ㅔ vs ㅐ 기초",sp:[
    ["바다에서 ___를 잡았다.","게","개","정답: 게 (바다에 사는 갑각류, 옆으로 걷는 동물)\n오답: 개 (멍멍 짖는 강아지)\n구분: 바닷가에서 잡는 건 '게', 집에서 키우는 건 '개'\n예) 꽃게를 잡았다 / 강아지(개)가 짖는다"],
    ["우리집 ___는 꼬리를 흔든다.","개","게","정답: 개 (사람을 잘 따르는 반려동물, 강아지)\n오답: 게 (바다에 사는 갑각류)\n구분: 꼬리를 흔드는 건 '개', 집게발이 있는 건 '게'\n예) 우리 개는 똑똑하다 / 게가 모래밭을 기어간다"],
    ["신발끈을 단단히 ___었다.","매","메","정답: 매다 (끈·줄을 묶는 동작)\n오답: 메다 (어깨에 걸치는 동작)\n외우기: '끈은 매다, 가방은 메다'\n예) 운동화 끈을 매다 / 책가방을 메다"],
    ["무거운 가방을 어깨에 ___었다.","메","매","정답: 메다 (어깨에 걸치는 동작)\n오답: 매다 (끈·줄을 묶는 동작)\n외우기: 어깨에 올리는 건 '메', 끈으로 묶는 건 '매'\n예) 배낭을 메다 / 넥타이를 매다"],
    ["톱으로 나무를 ___었다.","베","배","정답: 베다 (날카로운 것으로 자르는 동작)\n오답: 배 (사람의 신체 부위 또는 과일 '배')\n구분: 자르는 동작은 '베다', 신체·과일은 '배'\n예) 풀을 베다 / 배가 부르다"],
    ["과식해서 ___가 너무 부르다.","배","베","정답: 배 (사람의 신체 부위, 음식이 들어가는 곳)\n오답: 베다 (자르는 동작)\n구분: 신체 부위는 '배', 자르는 동작은 '베다'\n예) 배가 아프다 / 칼로 베다"],
    ["하늘을 나는 ___를 보았다.","새","세","정답: 새 (날아다니는 동물, 조류)\n오답: 세 (숫자 3을 뜻하는 우리말)\n구분: 날아다니면 '새', 개수를 세면 '세'\n예) 참새가 날다 / 사과 세 개"],
    ["사과 ___ 개를 샀다.","세","새","정답: 세 (숫자 3, 개수를 셀 때 쓰는 말)\n오답: 새 (날아다니는 동물)\n구분: 개수를 셀 때는 '세', 날아다니는 건 '새'\n예) 연필 세 자루 / 새가 지저귄다"],
    ["손에 ___가 잔뜩 묻어 새카맣다.","때","떼","정답: 때 (몸·옷에 묻은 더러움)\n오답: 떼 (여럿이 모인 무리)\n구분: 더러움은 '때', 무리는 '떼'\n예) 손에 때가 묻다 / 양 떼가 풀을 뜯다"],
    ["풀밭에서 양 ___가 풀을 뜯고 있다.","떼","때","정답: 떼 (여럿이 함께 모인 무리)\n오답: 때 (몸에 묻은 더러움)\n구분: 무리는 '떼', 더러움은 '때'\n예) 새 떼가 날다 / 옷에 때가 묻다"],
    ["선생님이 부르자 \"___\"라고 대답했다.","네","내","정답: 네 (긍정의 대답, '예'와 같은 뜻)\n오답: 내 (나의 줄임말)\n구분: 대답은 '네', 소유는 '내'\n예) \"네, 알겠습니다\" / 내 가방"],
    ["나는 14살이야. 오늘은 ___ 생일이거든.","내","네","정답: 내 (나의 줄임말, 말하는 사람 자신)\n오답: 네 (너의 줄임말 또는 대답)\n구분: '나의'는 '내', '너의'는 '네'\n예) 내 책 / 네 책"],
    ["민수야, ___ 가방 좀 잠깐 빌려줄래?","네","내","정답: 네 (너의 줄임말, 상대방의 것)\n오답: 내 (나의 줄임말)\n구분: 상대(민수)에게 묻고 있으니 '네=너의'\n※ 발음이 비슷해도 '누구의 것?'을 따져 보면 답이 보여요\n예) 네 책 좀 빌려줘 / 내 책은 여기 있어"],
    ["___가 처마 밑에 집을 지었다.","제비","재비","정답: 제비 (봄에 날아오는 작은 새)\n오답: 재비 (사전에 없는 잘못된 표기)\n외우기: '제비'는 표준어, '재비'는 틀린 말\n예) 제비가 돌아오다 / 제비집을 짓다"],
    ["푹신한 ___를 베고 잤다.","베개","배개","정답: 베개 (잘 때 머리 밑에 받치는 물건)\n오답: 배개 (사전에 없는 잘못된 표기)\n외우기: '베다(머리를 받치다)'에서 온 말이라 '베개'\n예) 베개를 베다 / 푹신한 베개"],
    ["학교 ___에 공지가 붙었다.","게시판","개시판","정답: 게시판 (글이나 공지를 붙여 놓는 판)\n오답: 개시판 (사전에 없는 잘못된 표기)\n외우기: 한자 '게시(揭示)'에서 온 말이라 '게시판'\n예) 알림이 게시판에 붙다 / 학급 게시판"],

/* ========== 효과음 (Web Audio API) ========== */
let audioCtx = null;
function getAC(){
  if(!audioCtx){
    try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
    catch(e){ return null; }
  }
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function beep(freq, dur, type='sine', vol=0.15, delay=0){
  const ac = getAC(); if(!ac) return;
  const t = ac.currentTime + delay;
  const osc = ac.createOscillator();
  const g = ac.createGain();
  osc.type = type; osc.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t+0.01);
  g.gain.exponentialRampToValueAtTime(0.001, t+dur);
  osc.connect(g); g.connect(ac.destination);
  osc.start(t); osc.stop(t+dur+0.02);
}
const sfx = {
  correct(){ beep(660,0.12,'sine',0.18); beep(990,0.18,'sine',0.18,0.1); },
  wrong(){ beep(220,0.18,'square',0.12); beep(160,0.22,'square',0.12,0.12); },
  tap(){ beep(800,0.05,'sine',0.08); },
  win(){ [523,659,784,1047].forEach((f,i)=>beep(f,0.2,'triangle',0.16,i*0.12)); },
  lose(){ beep(330,0.25,'triangle',0.14); beep(220,0.35,'triangle',0.14,0.2); }
};

/* ========== 유틸 ========== */
function $(s){return document.querySelector(s)}
function h(tag, attrs={}, ...children){
  const el = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)){
    if(k==='class') el.className=v;
    else if(k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if(k==='html') el.innerHTML=v;
    else el.setAttribute(k,v);
  }
  for(const c of children){
    if(c==null) continue;
    el.appendChild(typeof c==='string' ? document.createTextNode(c) : c);
  }
  return el;
}
function toast(msg){
  const t = $('#toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}
function normalize(s){ return (s||'').replace(/\s+/g,' ').trim(); }

/* TTS */
function speak(text){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  function doSpeak(){
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ko-KR'; u.rate = 0.85;
    speechSynthesis.speak(u);
  }
  const voices = speechSynthesis.getVoices();
  if(voices.length > 0){
    doSpeak();
  } else {
    // 갤럭시 등 안드로이드: 음성 목록 로드 후 실행
    speechSynthesis.onvoiceschanged = function(){
      speechSynthesis.onvoiceschanged = null;
      doSpeak();
    };
    // 혹시 이벤트 안 오면 0.5초 후 강제 실행
    setTimeout(doSpeak, 500);
  }
}

  if(rate>=0.70) return {title:'류봉두의 우등생', emoji:'🎓', color:'#58cc02'};
  if(rate>=0.55) return {title:'류봉두의 새싹', emoji:'🌱', color:'#ffc800'};

}

function renderSpelling(root){
  const s = state.stage;
  const q = s.sp[state.qIdx];
  const [text, optA, optB, explain] = q;
  // 정답은 항상 optA, 오답은 optB. 보여줄 때는 무작위로 섞음
  if(!state.shuffled){
    state.shuffled = Math.random()<0.5;
  }
  const opts = state.shuffled ? [optB, optA] : [optA, optB];

  const sentence = text.replace('___', '<span class="blank">_____</span>');

  root.appendChild(h('div',{class:'section-label'},`맞춤법 ${state.qIdx+1} / ${s.sp.length}`));
  root.appendChild(h('div',{class:'q-title'},'빈칸에 알맞은 말을 고르세요'));
  root.appendChild(h('div',{class:'q-sentence',html:sentence}));

  const opBox = h('div',{class:'options'});
  opts.forEach((o,i)=>{
    const isCorrect = (o===optA);
    const btn = h('button',{class:'opt',onclick:()=>{
      if(state.showAnswer) return;
      sfx.tap();
      document.querySelectorAll('.opt').forEach(x=>x.classList.remove('selected'));
      btn.classList.add('selected');
      state.selected = {choice:o, correct:isCorrect};
      $('#checkBtn').disabled = false;
    }}, o);
    opBox.appendChild(btn);
  });
  root.appendChild(opBox);

  const check = h('button',{id:'checkBtn',class:'btn btn-primary',style:'margin-top:16px',disabled:'true',
    onclick:()=>checkSpelling(text, optA, optB, explain)},'확인');
  root.appendChild(check);
}

function checkSpelling(text, ans, wrong, explain){
  if(!state.selected) return;
  const ok = state.selected.correct;
  state.total++;
  if(ok){ state.correct++; sfx.correct(); }
  else {
    if(state.mode==='challenge') state.hearts--;
    sfx.wrong();
    state.wrong.push({
      type:'맞춤법',
      q:text.replace('___','( ___ )'),
      my:state.selected.choice,
      ans:ans,
      explain:explain
    });
  }
  showFeedback(ok, ans, explain);
}

function checkDictation(typed, ans){
  const my = normalize(typed);
  const correct = normalize(ans);
  const ok = my===correct;

  // 연습 모드: 첫 오답일 때 정답 비공개 + 한 번 더 듣기 기회 제공
  if(!ok && state.mode==='practice' && !state.retried){
    state.retried = true;
    sfx.wrong();
    showRetryFeedback(ans);
    return;
  }

  state.total++;
  if(ok){ state.correct++; sfx.correct(); }
  else {
    if(state.mode==='challenge') state.hearts--;
    sfx.wrong();
    state.wrong.push({
      type:'받아쓰기',
      q:'들려준 문장',
      my: typed.trim() || '(빈칸)',
      ans: ans,
      explain:'정답: '+ans+'\n띄어쓰기와 받침까지 정확히 맞추는 것이 중요해요.\n천천히 발음을 끊어서 들어 보세요.\n예) 한 글자씩 또박또박 받아써 보기'
    });
  }
  state.retried = false; // 다음 문항을 위해 초기화
  showFeedback(ok, ans, ok?'완벽해요!':'정답: '+ans+'\n띄어쓰기와 받침까지 정확히 맞추어 보세요.');
}

function showRetryFeedback(ans){
  state.showAnswer = false;
  let fb = $('#fb');
  if(!fb){
    fb = h('div',{id:'fb',class:'feedback'});
    document.body.appendChild(fb);
  }
  fb.className = 'feedback show wrong';
  fb.innerHTML = '';
  fb.appendChild(h('div',{class:'fb-head'},
    h('div',{class:'fb-icon'}, '🎧'),
    h('div',{class:'fb-title'}, '한 번 더 들어볼까요?')
  ));
  fb.appendChild(h('div',{class:'fb-detail',html:'정답을 보여드리지 않을게요.<br>천천히 다시 들어보고 받침과 띄어쓰기를 살펴보세요.'}));
  fb.appendChild(h('button',{class:'fb-btn',onclick:()=>{
    fb.classList.remove('show');
    speak(ans);
    const inp = document.querySelector('.dict-input');
    if(inp){ inp.focus(); inp.select(); }
  }},'다시 듣기'));
}

function showFeedback(ok, ans, explain){
  state.showAnswer = true;
  let fb = $('#fb');
  if(!fb){
    fb = h('div',{id:'fb',class:'feedback'});
    document.body.appendChild(fb);
  }
  fb.className = 'feedback show '+(ok?'correct':'wrong');
  fb.innerHTML = '';
  fb.appendChild(h('div',{class:'fb-head'},
    h('div',{class:'fb-icon'}, ok?'🎉':'😅'),
    h('div',{class:'fb-title'}, ok?'정답입니다!':'아쉬워요')
  ));
  const explainHtml = String(explain||'').replace(/\n/g,'<br>');
  fb.appendChild(h('div',{class:'fb-detail',html: ok ? '잘했어요. 다음 문제로 가요!' :
    `정답: <strong>${ans}</strong><br>💡 ${explainHtml}`}));
  fb.appendChild(h('button',{class:'fb-btn',onclick:nextQ},'계속하기'));

  // 하트 0 처리
  if(state.hearts<=0){
    setTimeout(()=>{ fb.classList.remove('show'); gameOver(); }, 900);
  }
}

function nextQ(){
  const fb = $('#fb'); if(fb) fb.classList.remove('show');
  state.showAnswer=false; state.selected=null; state.shuffled=null;
  state.qIdx++;
  if(state.phase==='spelling'){
    if(state.qIdx>=state.stage.sp.length){
      state.phase='dictation'; state.qIdx=0;
    }
  } else {
    if(state.qIdx>=state.stage.dt.length){ return finishStage(); }
  }
  renderQ();
}

/* ========== 결과 ========== */
function finishStage(){
  const rate = state.total ? state.correct/state.total : 0;
  rate>=0.7 ? sfx.win() : sfx.lose();
  state.phase='result';
  renderResult();
}

function renderResult(){
  const app=$('#app'); app.innerHTML='';
  const rate = state.total ? state.correct/state.total : 0;
  const lv = levelInfo(rate);
  const pct = Math.round(rate*100);

  const wrap = h('div',{class:'result'});
  const modeLabel = state.mode==='challenge' ? '챌린지' : '연습';
  const modeClass = state.mode==='challenge' ? 'mode-badge challenge' : 'mode-badge';
  wrap.appendChild(h('div',{class:'result-top'},
    h('div',{class:'result-emoji'},lv.emoji),
    h('div',{class:'result-title'},'STAGE '+state.stage.id+' 완료!'),
    h('div',{},
      h('span',{class:'result-level',style:`background:${lv.color};color:#fff;box-shadow:0 3px 0 rgba(0,0,0,.15)`}, lv.title),
      h('span',{class:modeClass}, modeLabel)
    )
  ));

  const heartCard = (state.mode==='challenge')
    ? h('div',{class:'stat-card'}, h('div',{class:'stat-n'},state.hearts+'❤'), h('div',{class:'stat-l'},'남은 하트'))
    : h('div',{class:'stat-card'}, h('div',{class:'stat-n'},'완료 ✓'), h('div',{class:'stat-l'},'연습 모드'));
  wrap.appendChild(h('div',{class:'result-stats'},
    h('div',{class:'stat-card'}, h('div',{class:'stat-n'},pct+'%'), h('div',{class:'stat-l'},'정답률')),
    h('div',{class:'stat-card'}, h('div',{class:'stat-n'},state.correct+'/'+state.total), h('div',{class:'stat-l'},'맞은 문제')),
    heartCard
  ));

  if(state.wrong.length){
    const rev = h('div',{class:'review-section'},
      h('h3',{},`복습이 필요한 문제 (${state.wrong.length}개)`));
    const list = h('div',{class:'review-list'});
    state.wrong.forEach(w=>{
      const item = h('div',{class:'review-item'},
        h('div',{class:'review-q'},`[${w.type}] `+w.q),
        h('div',{class:'review-row my'}, h('div',{class:'k'},'내 답'), h('div',{class:'v'},w.my)),
        h('div',{class:'review-row ans'}, h('div',{class:'k'},'정답'), h('div',{class:'v'},w.ans)),
        h('div',{class:'review-explain'},'💡 '+w.explain)
      );
      list.appendChild(item);
    });
    rev.appendChild(list);
    wrap.appendChild(rev);
  } else {
    wrap.appendChild(h('div',{class:'review-section'},
      h('h3',{},'🎯 한 문제도 틀리지 않았어요!')));
  }

  wrap.appendChild(h('div',{class:'result-actions'},
    h('button',{class:'btn btn-primary',onclick:sendResult},'📤 결과 전송하기'),
    h('button',{class:'btn btn-ghost',onclick:()=>{state.phase='home';renderHome();}},'🏠 홈으로 돌아가기')
  ));

  app.appendChild(wrap);
}

function sendResult(){
  if(!CONFIG.APPS_SCRIPT_URL){
    toast('전송 URL이 설정되지 않았어요 (로컬 저장만 됨)');
    saveLocal(); return;
  }
  toast('전송 중...');
  const rate = state.total ? state.correct/state.total : 0;
  const lv = levelInfo(rate);
  const payload = {
    name: state.name,
    mode: state.mode==='challenge' ? '챌린지' : '연습',
    stage: state.stage.id,
    stageName: state.stage.name,
    total: state.total,
    correct: state.correct,
    rate: Math.round(rate*100),
    level: lv.title,
    hearts: state.mode==='challenge' ? state.hearts : '-',
    wrong: state.wrong.map(w=>`${w.type}/${w.q.replace(/<[^>]+>/g,'')}/내답:${w.my}/정답:${w.ans}`),
    at: new Date().toISOString()
  };
  fetch(CONFIG.APPS_SCRIPT_URL, {
    method:'POST',
    
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify(payload)
  }).then(()=>{ toast('✓ 전송 완료'); saveLocal(); })
    .catch(()=>{ toast('전송 실패 — 로컬 저장만 됨'); saveLocal(); });
}

function saveLocal(){
  const logs = JSON.parse(localStorage.getItem('rbd_logs')||'[]');
  logs.push({name:state.name, mode:state.mode, stage:state.stage.id, correct:state.correct, total:state.total, at:Date.now()});
  localStorage.setItem('rbd_logs', JSON.stringify(logs));
}

/* ========== 게임오버 / 종료 확인 ========== */
function gameOver(){
  state.phase='gameover';
  const m = $('#modal');
  m.classList.add('show');
  m.innerHTML='';
  m.appendChild(h('div',{class:'modal'},
    h('div',{class:'modal-icon'},'💔'),
    h('h3',{},'하트를 모두 잃었어요'),
    h('p',{html:`${state.qIdx+1}번째 문제에서 멈췄어요.<br>처음부터 다시 도전할까요?`}),
    h('div',{class:'modal-actions'},
      h('button',{class:'btn btn-red',onclick:()=>{m.classList.remove('show');sfx.tap();startStage(state.stage.id);}},'다시 도전하기'),
      h('button',{class:'btn btn-ghost',onclick:()=>{m.classList.remove('show');state.phase='home';renderHome();}},'홈으로 돌아가기')
    )
  ));
}

function confirmExit(){
  const m=$('#modal'); m.classList.add('show'); m.innerHTML='';
  m.appendChild(h('div',{class:'modal'},
    h('div',{class:'modal-icon'},'🚪'),
    h('h3',{},'정말 나가시겠어요?'),
    h('p',{},'지금까지 푼 진도가 모두 사라져요.'),
    h('div',{class:'modal-actions'},
      h('button',{class:'btn btn-red',onclick:()=>{m.classList.remove('show');state.phase='home';renderHome();}},'나가기'),
      h('button',{class:'btn btn-ghost',onclick:()=>m.classList.remove('show')},'계속 풀기')
    )
  ));
}

/* ========== 시작 ========== */
renderHome();
// 첫 탭에서 오디오 컨텍스트 활성화 (iOS 정책)
document.addEventListener('touchstart', ()=>getAC(), {once:true});
document.addEventListener('click', ()=>getAC(), {once:true});
</script>
